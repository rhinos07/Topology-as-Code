# Process rules, not physical structure. Changes more frequently than
# structure/ - a separate, lighter-weight review flow is conceivable.
#
# Note on AutoStore vs. example_customer/hall_3's REPL_PICKFACE_A pattern:
# classic min_max replenishment moves goods from bulk storage to a
# separate, fixed pick face (HBR -> FIX). AutoStore doesn't have that
# distinction - the port *is* the pick face, a robot brings whichever bin
# is needed directly to it. This minimal example has no separate
# goods-receipt/staging area either (see structure/storage.yaml), so
# there is no upstream zone left to define a replenishment_strategy
# against - induction happens directly at the ports
# (strategies/movement_rules.yaml).

replenishment_strategies: []
