# Physical connectivity ("can"). Functional permission is defined in
# strategies/movement_rules.yaml ("may") - deliberately separated.

lanes:
  # Tote conveyor between the doors' staging lanes and the induction/pick
  # ports. Not shuttle-compatible - this is small tote conveyor, not
  # pallet lane technology.
  - id: "lane_induction_01"
    template: "lane_tote_conveyor"
    connects: ["DOOR_IN", "WC_PORT_01"]

  - id: "lane_induction_02"
    template: "lane_tote_conveyor"
    connects: ["DOOR_IN", "WC_PORT_02"]

  - id: "lane_pick_01"
    template: "lane_tote_conveyor"
    connects: ["WC_PORT_03", "DOOR_OUT"]

  - id: "lane_pick_02"
    template: "lane_tote_conveyor"
    connects: ["WC_PORT_04", "DOOR_OUT"]

conveyor_segments:
  # Grid <-> port: the robot surfaces/re-stows a bin at the top of the
  # grid's lift column adjacent to each port.
  - id: "SEG_GRID_PORT01"
    from: "AUTOSTORE_GRID"
    to: "RP_PORT_01"
    capacity: 1

  - id: "SEG_GRID_PORT02"
    from: "AUTOSTORE_GRID"
    to: "RP_PORT_02"
    capacity: 1

  - id: "SEG_GRID_PORT03"
    from: "AUTOSTORE_GRID"
    to: "RP_PORT_03"
    capacity: 1

  - id: "SEG_GRID_PORT04"
    from: "AUTOSTORE_GRID"
    to: "RP_PORT_04"
    capacity: 1

conveyor_main:
  connects: ["AUTOSTORE_GRID", "WC_PORT_01", "WC_PORT_02", "WC_PORT_03", "WC_PORT_04", "DOOR_IN", "DOOR_OUT"]
  capacity_units_per_hour: 2600   # 4 ports x ~650 totes/h nominal port throughput
