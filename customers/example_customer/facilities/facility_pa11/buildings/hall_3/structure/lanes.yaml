# Physical connectivity ("can"). Functional permission is defined in
# strategies/movement_rules.yaml ("may") - deliberately separated.

connections:
  - id: "MAN_HBR_TO_FIX"
    from: "HBR"
    to: "FIX"
    direction: "bidirectional"
    transport_mode: "forklift"
    expected_duration: {value: 4, unit: "min"}

  - id: "MAN_PACK_TO_STAGING"
    from: "WC_PACK_01"
    to: "STAGING"
    direction: "bidirectional"
    transport_mode: "walking"
    expected_duration: {value: 2, unit: "min"}

lanes:
  - id: "lane_main_a"
    template: "lane_shuttle_standard"
    connects: ["HBR", "DOOR_01"]

  - id: "lane_main_b"
    template: "lane_shuttle_standard"
    connects: ["WC_PACK_01", "DOOR_02"]

conveyor_segments:
  - id: "SEG_C01_C02"
    from: "RP_C01"
    to: "RP_C02"
    capacity: 3   # max. HUs simultaneously on the segment

  - id: "SEG_C02_C03"
    from: "RP_C02"
    to: "RP_C03"
    capacity: 3

conveyor_main:
  connects: ["HBR", "DOOR_01", "WC_PACK_01"]
  capacity_units_per_hour: 200
