# Physical warehouse structure. Only changes during an actual rebuild.
# Validated against schemas/storage-type.schema.json (per entry in storage_types)

storage_types:

  # --- Rack location area, automated (shuttle) ---
  - id: "HBR"
    automation_level: "conveyor_automated"
    movement_policy: "explicit_only"     # every route must be explicitly defined
    access_model: "rack"
    access_order: "direct"
    controller: "CTRL_HBR_01"      # references structure/wcs.yaml controller_definitions

    storage_point_generator:
      aisles: 12
      stacks: 8
      levels: 6
      coordinate_pattern: "{aisle:02d}-{stack:02d}-{level:02d}"

    default_attributes:
      max_weight: { value: 500, unit: "kg" }
      temperature_zone: "ambient"
      capacity_per_point: 1
      size:
        width: { value: 1.2, unit: "m" }
        depth: { value: 0.8, unit: "m" }
        height: { value: 0.4, unit: "m" }
      position: "ZONE_HBR"     # logical position; use x/y/z per-coordinate override where exact placement matters
      allowed_load_unit_types: ["pallet_euro", "pallet_industrial"]
      capacity_volume: { value: 0.25, unit: "m3" }

    exceptions:
      - coordinate: "01-01-06"
        max_weight: { value: 800, unit: "kg" }      # top level, reinforced rack
        position: { x: 4.8, y: 12.0, z: 3.6 }    # metric override, measured from building reference point
      - coordinate: "03-04-01"
        blocked: true
        blocked_reason: "OBSTRUCTION"    # column in the way

    sections:
      - id: "SEC_FAST"
        criteria: { access_frequency: "high" }
        selector:
          aisles: { from: 1, to: 4 }
      - id: "SEC_SLOW"
        criteria: { access_frequency: "low" }
        selector:
          aisles: { from: 5, to: 12 }

    section_membership:
      require_full_coverage: true

  # --- Rack location area, flexible bay width (2/3 storage) ---
  # Each bay can be occupied by EITHER 2 industrial pallets OR 3 euro pallets,
  # never both at once - the two coordinate sets physically overlap.
  - id: "HBR_FLEX"
    automation_level: "manual"
    movement_policy: "default_allow"
    access_model: "rack"
    access_order: "direct"

    layout_variants:
      - id: "2_industrial"
        load_unit_type: "pallet_industrial"
        positions_per_bay: 2
        coordinate_pattern: "FLEX-{aisle:02d}-{bay:02d}-IND-{slot:1d}"
      - id: "3_euro"
        load_unit_type: "pallet_euro"
        positions_per_bay: 3
        coordinate_pattern: "FLEX-{aisle:02d}-{bay:02d}-EUR-{slot:1d}"

    layout_grid:
      aisles: 2
      bays: 3

    default_attributes:
      max_weight: { value: 1000, unit: "kg" }
      temperature_zone: "ambient"
      capacity_per_point: 1

  # --- Block location area, manual (forklift) ---
  - id: "BLK"
    automation_level: "manual"
    movement_policy: "default_allow"     # explicitly prohibiting exceptions is sufficient
    access_model: "block"
    depth: 5
    stack_height: 3
    access_order: "lifo"
    homogeneity_required: true

    storage_point_generator:
      aisles: 4
      stacks: 1
      levels: 1
      coordinate_pattern: "BLK-{aisle:02d}"

    default_attributes:
      max_weight: { value: 1000, unit: "kg" }       # per load unit
      temperature_zone: "ambient"
      capacity_per_point: 15     # 5 deep x 3 high
      size:
        width: { value: 2.4, unit: "m" }
        depth: { value: 4.0, unit: "m" }
        height: { value: 3.0, unit: "m" }
      position: "ZONE_BLK"
      allowed_load_unit_types: ["pallet_euro", "pallet_industrial", "mesh_box"]

  # --- Fixed-location picking area, manual ---
  - id: "FIX"
    automation_level: "manual"
    movement_policy: "default_allow"
    access_model: "rack"
    access_order: "direct"

    storage_point_generator:
      aisles: 6
      stacks: 4
      levels: 1
      coordinate_pattern: "FIX-{aisle:02d}-{stack:02d}"

    default_attributes:
      max_weight: { value: 50, unit: "kg" }
      temperature_zone: "ambient"
      capacity_per_point: 1
      size:
        width: { value: 0.4, unit: "m" }
        depth: { value: 0.3, unit: "m" }
        height: { value: 0.3, unit: "m" }
      position: "ZONE_FIX"
      allowed_load_unit_types: ["carton"]

    sections:
      - id: "SEC_PICKFACE"
        criteria: { access_frequency: "very_high" }
        selector:
          aisles: { from: 1, to: 6 }

    section_membership:
      require_full_coverage: true

  # --- Cold zone, manual ---
  - id: "COLD_ZONE_B"
    automation_level: "manual"
    movement_policy: "default_allow"
    access_model: "rack"
    access_order: "direct"

    storage_point_generator:
      aisles: 2
      stacks: 6
      levels: 3
      coordinate_pattern: "KB-{aisle:02d}-{stack:02d}-{level:02d}"

    default_attributes:
      max_weight: { value: 400, unit: "kg" }
      temperature_zone: { min: 2, max: 8, unit: "C" }
      capacity_per_point: 1
      size:
        width: { value: 1.2, unit: "m" }
        depth: { value: 0.8, unit: "m" }
        height: { value: 0.4, unit: "m" }
      position: "ZONE_COLD_B"
      allowed_load_unit_types: ["pallet_euro"]

  # --- Channel/flow storage, satellite-operated (FIFO) ---
  - id: "CHANNEL_A"
    automation_level: "conveyor_automated"
    movement_policy: "explicit_only"
    access_model: "channel"
    channel_depth: 6
    entry_side: "front"
    exit_side: "back"        # entry != exit -> FIFO channel
    homogeneity_required: true

    storage_point_generator:
      aisles: 3
      stacks: 6
      levels: 4
      coordinate_pattern: "CH-{aisle:02d}-{stack:02d}-{level:02d}"

    default_attributes:
      max_weight: { value: 600, unit: "kg" }
      temperature_zone: "ambient"
      capacity_per_point: 1
      size:
        width: { value: 1.2, unit: "m" }
        depth: { value: 0.8, unit: "m" }
        height: { value: 0.4, unit: "m" }
      position: "ZONE_CHANNEL_A"
      allowed_load_unit_types: ["pallet_euro"]

  # --- AutoStore-style cube storage, automated (robots on a grid) ---
  # Bins are stacked in columns; a robot can only ever remove the top bin
  # of a column (LIFO per column) - modeled as 'block' with stack_height
  # = bins per column and access_order 'lifo'.
  - id: "AUTOSTORE_A"
    automation_level: "conveyor_automated"
    movement_policy: "explicit_only"
    access_model: "block"
    depth: 1
    stack_height: 16          # bins stacked per grid column
    access_order: "lifo"      # robot can only pick the top bin of a column
    controller: "CTRL_AUTOSTORE_01"   # references structure/wcs.yaml controller_definitions

    storage_point_generator:
      aisles: 10    # grid columns, x-direction
      stacks: 10    # grid columns, y-direction
      levels: 1
      coordinate_pattern: "AS-{aisle:02d}-{stack:02d}"

    default_attributes:
      max_weight: { value: 30, unit: "kg" }       # per bin
      temperature_zone: "ambient"
      capacity_per_point: 16   # 16 bins stacked per column
      size:
        width: { value: 0.649, unit: "m" }
        depth: { value: 0.449, unit: "m" }
        height: { value: 0.31, unit: "m" }
      position: "ZONE_AUTOSTORE_A"
      allowed_load_unit_types: ["autostore_bin"]

  # --- Hazardous materials storage, manual, compliance-restricted ---
  - id: "HAZMAT_A"
    automation_level: "manual"
    movement_policy: "default_allow"
    access_model: "rack"
    access_order: "direct"

    storage_point_generator:
      aisles: 1
      stacks: 4
      levels: 2
      coordinate_pattern: "HZ-{aisle:02d}-{stack:02d}-{level:02d}"

    default_attributes:
      max_weight: { value: 500, unit: "kg" }
      temperature_zone: "ambient"
      capacity_per_point: 1
      size:
        width: { value: 1.2, unit: "m" }
        depth: { value: 0.8, unit: "m" }
        height: { value: 0.4, unit: "m" }
      position: "ZONE_HAZMAT_A"
      allowed_load_unit_types: ["pallet_euro", "mesh_box"]
      capacity_volume: { value: 0.25, unit: "m3" }
      hazmat_classes: ["GHS02_FLAMMABLE", "GHS05_CORROSIVE"]

  # --- Staging area at the doors, manual ---
  - id: "STAGING"
    automation_level: "manual"
    movement_policy: "default_allow"
    access_model: "block"
    depth: 1
    stack_height: 1
    access_order: "lifo"

    storage_point_generator:
      aisles: 4
      stacks: 1
      levels: 1
      coordinate_pattern: "STG-{aisle:02d}"

    default_attributes:
      max_weight: { value: 1000, unit: "kg" }
      temperature_zone: "ambient"
      capacity_per_point: 1
      allowed_load_unit_types: ["pallet_euro", "pallet_industrial", "mesh_box", "carton"]

    exceptions:
      - coordinate: "STG-01"
        section: "SEC_STAGING_IN"
      - coordinate: "STG-02"
        section: "SEC_STAGING_IN"
      - coordinate: "STG-03"
        section: "SEC_STAGING_OUT"
      - coordinate: "STG-04"
        section: "SEC_STAGING_RETURNS"

    sections:
      - id: "SEC_STAGING_IN"
        criteria: { flow_direction: "inbound" }
      - id: "SEC_STAGING_OUT"
        criteria: { flow_direction: "outbound" }
      - id: "SEC_STAGING_RETURNS"
        criteria: { flow_direction: "returns" }

    section_membership:
      require_full_coverage: true

# Functional cross-cutting grouping - orthogonal to the physical hierarchy.
# A storage_point can be in multiple activity_areas at the same time.
activity_areas:
  - id: "PICK_ZONE_A"
    activity: "picking"
    bins_from: ["FIX.SEC_PICKFACE"]

  - id: "PUTAWAY_ZONE_A"
    activity: "putaway"
    bins_from: ["HBR.SEC_FAST", "HBR.SEC_SLOW"]

  - id: "INVENTORY_ZONE_A"
    activity: "physical_inventory"
    bins_from: ["HBR.SEC_SLOW", "BLK"]

# Workstations
work_centers:
  - id: "WC_PACK_01"
    step: "packing"
    workstation_template: "ws_pick_to_light"
    storage_point_ref: true    # WIP inventory can be booked at the work center itself

# Doors / goods receipt-dispatch
doors:
  - id: "DOOR_01"
    direction: "inbound"
    staging_section: "STAGING.SEC_STAGING_IN"
    determination_group: "pallets"

  - id: "DOOR_02"
    direction: "outbound"
    staging_section: "STAGING.SEC_STAGING_OUT"
    determination_group: "pallets"

  - id: "DOOR_03"
    direction: "returns"
    staging_section: "STAGING.SEC_STAGING_RETURNS"
    determination_group: "pallets"
