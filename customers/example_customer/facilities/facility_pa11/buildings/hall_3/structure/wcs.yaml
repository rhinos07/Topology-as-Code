# Warehouse Control System (WCS): PLC communication, reporting points, telegram actions.
# A reporting_point is always also modeled as a storage_point.

plc_definitions:
  - id: "PLC_HBR_01"
    name: "AS/RS Hall 3"
    reference_number: "AN-2024-0113"
    channels:
      - id: "CH_01"
        ip: "10.0.1.20"
        port: 5000
        telegram_length: 128
        handshake_mode: "confirmed"

reporting_points:
  - id: "RP_C01"
    storage_point_ref: true
    plc: "PLC_HBR_01"
    type: "identification_point"     # or "aisle_decision_point", "clarification_point"
    capacity: 1
    availability: "available"

  - id: "RP_C02"
    storage_point_ref: true
    plc: "PLC_HBR_01"
    type: "aisle_decision_point"
    capacity: 1
    availability: "available"

  - id: "RP_C03"
    storage_point_ref: true
    plc: "PLC_HBR_01"
    type: "clarification_point"      # manual clarification on identification error
    capacity: 2
    availability: "available"

telegram_actions:
  - telegram_type: "XX"
    action: "confirm_and_advance"
    from_point: "RP_C01"
    to_point: "RP_C02"
    next_target: "RP_C03"

equipment:
  - id: "SRM_01"
    type: "shuttle_4way"          # references elements/equipment_types.yaml
    mode: "wms_controlled"        # "wms_controlled" = WMS decides the route, "plc_autonomous" = PLC-autonomous with its own buffer
    bin_access_type: "AUTO"
    served_points: ["RP_C01", "RP_C02", "RP_C03"]
    fleet_interface: "vda5050"
