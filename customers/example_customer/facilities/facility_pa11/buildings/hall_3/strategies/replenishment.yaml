# Process rules, not physical structure. Changes more frequently than
# structure/ - a separate, lighter-weight review flow is conceivable.

replenishment_strategies:

  - id: "REPL_PICKFACE_A"
    trigger:
      type: "min_max"
      min_qty: 10
      max_qty: 50
      check_interval: { value: 5, unit: "min" }
    source:
      storage_type: "HBR"
      section: "SEC_SLOW"
    destination:
      storage_type: "FIX"
      activity_area: "PICK_ZONE_A"
    unit_conversion:
      from_uom: "pallet"
      to_uom: "piece"
    priority: "normal"
    timing: "immediate"

  - id: "REPL_ZERO_STOCK_A"
    trigger:
      type: "zero_stock"
    source:
      storage_type: "HBR"
    destination:
      activity_area: "PICK_ZONE_A"
    priority: "urgent"
    timing: "immediate"

  - id: "REPL_PREDICTIVE_A"
    trigger:
      type: "predictive"
      forecast_horizon: { value: 2, unit: "h" }
      based_on: "outbound_order_forecast"
    source:
      storage_type: "HBR"
      section: "SEC_FAST"
    destination:
      activity_area: "PICK_ZONE_A"
    priority: "normal"
    timing: "batch_window: 22:00-06:00"
