# Building-level file. Short and stable - references everything else.
# Part of a facility (see ../../facility.yaml). This file validates
# against schemas/warehouse.schema.json

api_version: "warehouse-as-code/v1"

metadata:
  dataset_id: "example_customer/pa11/hall_3"
  revision: "1"

target:
  wms_type: "generic"
  tenant: "example_customer"
  facility: "PA11"
  building: "hall_3"

import_policy:
  mode: "reconcile"
  removal_policy: "deactivate"
  unmanaged_objects: "preserve"
  require_plan_approval: true

warehouse:
  name: "Hall_3"
  automation_level: "mixed"

  imports:
    - "structure/storage.yaml"
    - "structure/lanes.yaml"
    - "structure/wcs.yaml"
    - "strategies/replenishment.yaml"
    - "strategies/movement_rules.yaml"

  # Connection to fleet control (VDA 5050)
  fleet_interface:
    protocol: "vda5050"
    version: "3.0"
    mqtt_broker: "internal://fleet-broker"
    node_mapping: "auto"   # lanes/storage_points are compiled into VDA5050 nodes/edges
