# Materialflussrechner-Kommunikation: SPS, Meldepunkte, Telegramm-Aktionen.
# Ein reporting_point wird immer auch als storage_point abgebildet.

sps_definitions:
  - id: "SPS_HRL_01"
    channels:
      - id: "CH_01"
        ip: "10.0.1.20"
        port: 5000
        telegram_length: 128
        handshake_mode: "confirmed"

reporting_points:
  - id: "MP_C01"
    storage_point_ref: true
    sps: "SPS_HRL_01"
    type: "identification_point"     # oder "aisle_decision_point", "clarification_point"
    capacity: 1
    availability: "available"

  - id: "MP_C02"
    storage_point_ref: true
    sps: "SPS_HRL_01"
    type: "aisle_decision_point"
    capacity: 1
    availability: "available"

  - id: "MP_C03"
    storage_point_ref: true
    sps: "SPS_HRL_01"
    type: "clarification_point"      # manuelle Klaerung bei Identifikationsfehler
    capacity: 2
    availability: "available"

telegram_actions:
  - telegram_type: "XX"
    action: "confirm_and_advance"
    from_point: "MP_C01"
    to_point: "MP_C02"
    next_target: "MP_C03"

resources:
  - id: "RBG_01"
    type: "shuttle_4way"
    mode: "resource"          # "resource" = WMS-gesteuert, "vehicle" = SPS-autonom mit eigenem Puffer
    bin_access_type: "AUTO"
    served_points: ["MP_C01", "MP_C02", "MP_C03"]
    fleet_interface: "vda5050"
