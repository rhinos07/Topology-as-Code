# "May" - independent of "can" (structure/lanes.yaml).
# Policy depends on the automation_level of the respective storage_type:
#   default_allow   -> manual areas, only list exceptions explicitly
#   explicit_only   -> automated/conveyor areas, every route explicit

movement_rules:

  # --- explicit_only: automated area (HBR) ---
  - id: "ROUTE_ASRS_C01_TO_C02"
    applies_to_policy: "explicit_only"
    from: { reporting_point: "RP_C01" }
    to: { reporting_point: "RP_C02" }
    allowed: true
    via_segment: "SEG_C01_C02"
    trigger: "putaway_task"

  - id: "ROUTE_ASRS_C02_TO_C03"
    applies_to_policy: "explicit_only"
    from: { reporting_point: "RP_C02" }
    to: { reporting_point: "RP_C03" }
    allowed: true
    via_segment: "SEG_C02_C03"
    trigger: "clarification"

  # --- default_allow: manual areas, only prohibitions explicit ---
  - id: "FORBID_COLD_TO_AMBIENT"
    applies_to_policy: "default_allow"
    from: { storage_type: "COLD_ZONE_B" }
    to: { storage_type: "*" }
    exclude_to: { storage_type: "COLD_ZONE_B" }
    allowed: false
    reason: "Cold chain must not be interrupted"

  # --- Standard replenishment route HBR -> FIX (pallet -> piece) ---
  - id: "MOVE_STORAGE_TO_PICKFACE"
    applies_to_policy: "default_allow"
    from: { storage_type: "HBR" }
    to: { storage_type: "FIX", activity_area: "PICK_ZONE_A" }
    allowed: true
    allowed_load_unit_types: ["pallet_euro"]
    conversion_required: true
    trigger: "replenishment_task"

  # --- Block location: only to the open end, only same article ---
  - id: "MOVE_INTO_BLOCK"
    applies_to_policy: "default_allow"
    to: { storage_type: "BLK" }
    allowed: true
    access_constraint: "lifo"
    homogeneity_check: true
    trigger: "putaway_task"
