# Example CI pipeline. Logic is 1:1 portable to TeamCity
# (PowerShell build step: pip install -r requirements.txt && python tools/validate.py ...)
name: Validate warehouse definitions

on:
  pull_request:
    paths:
      - "customers/**"
      - "elements/**"
      - "schemas/**"
      - "tools/**"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Validate each customer folder with warehouse.yaml individually.
        # For multiple customers, extend the list here or generate it
        # dynamically from the filesystem via a preliminary job.
        customer: ["example_customer"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python tools/validate.py customers/${{ matrix.customer }}/warehouse.yaml
