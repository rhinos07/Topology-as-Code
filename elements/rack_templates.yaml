# Reusable, rarely changed building blocks.
# Referenced by structure/lanes.yaml (lane_templates) and
# structure/storage.yaml (workstation_templates).
#
# A rack_templates catalog used to live here too, but was removed: no
# schema field anywhere ever let a storage_type/storage_point reference a
# rack template id (physical rack attributes are carried by
# storage_type.default_attributes/exceptions instead) - found dead by
# WMS-POC's Topology-as-Code review, unreferenced by any customer data or
# test.

lane_templates:
  - id: "lane_shuttle_standard"
    width: { value: 2.5, unit: "m" }
    direction: "bidirectional"
    shuttle_compatible: true
    max_speed: { value: 1.5, unit: "m/s" }

workstation_templates:
  - id: "ws_pick_to_light"
    type: "pick-to-light"
    ergonomic_class: "standing"
    throughput_capacity: 120  # picks per hour

  - id: "ws_autostore_port"
    type: "goods-to-person"
    ergonomic_class: "standing"
    throughput_capacity: 650  # bins/totes per hour, nominal AutoStore port throughput
