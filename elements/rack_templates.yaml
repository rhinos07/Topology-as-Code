# Reusable, rarely changed building blocks.
# Referenced by structure/storage.yaml.

rack_templates:
  - id: "rack_4way_standard"
    description: "Standard rack slot for 4-way shuttle"
    dimensions:
      width: { value: 1.2, unit: "m" }
      depth: { value: 0.8, unit: "m" }
      height: { value: 0.4, unit: "m" }
    max_weight: { value: 500, unit: "kg" }
    temperature_zone: "ambient"

  - id: "rack_coldstorage_standard"
    description: "Rack slot for cold zone"
    dimensions:
      width: { value: 1.2, unit: "m" }
      depth: { value: 0.8, unit: "m" }
      height: { value: 0.4, unit: "m" }
    max_weight: { value: 400, unit: "kg" }
    temperature_zone: { min: 2, max: 8, unit: "C" }

lane_templates:
  - id: "lane_shuttle_standard"
    width: { value: 2.5, unit: "m" }
    direction: "bidirectional"
    shuttle_compatible: true
    max_speed: { value: 1.5, unit: "m/s" }

workstation_templates:
  - id: "ws_pick_to_light"
    type: "pick-to-light"
    ergonomic_class: "standing"
    throughput_capacity: 120  # picks per hour

  - id: "ws_autostore_port"
    type: "goods-to-person"
    ergonomic_class: "standing"
    throughput_capacity: 650  # bins/totes per hour, nominal AutoStore port throughput
