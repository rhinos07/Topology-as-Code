# Reusable definitions of physical load unit types (pallets, containers, cartons).
# Referenced by movement_rule.allowed_load_unit_types and replenishment_strategy.unit_conversion.

load_unit_types:
  - id: "pallet_euro"
    description: "EUR-pallet (EPAL), 800x1200mm"
    dimensions: { width: "0.8m", depth: "1.2m", height: "0.144m" }
    max_weight: "1000kg"
    stackable: true
    volume: "0.138m3"

  - id: "pallet_industrial"
    description: "Industrial pallet, 1000x1200mm"
    dimensions: { width: "1.0m", depth: "1.2m", height: "0.144m" }
    max_weight: "1500kg"
    stackable: true
    volume: "0.173m3"

  - id: "mesh_box"
    description: "Wire mesh box container, 800x1200mm"
    dimensions: { width: "0.8m", depth: "1.2m", height: "0.97m" }
    max_weight: "700kg"
    stackable: true
    volume: "0.931m3"

  - id: "carton"
    description: "Standard shipping carton"
    dimensions: { width: "0.4m", depth: "0.3m", height: "0.3m" }
    max_weight: "20kg"
    stackable: false
    volume: "0.036m3"

  - id: "autostore_bin"
    description: "AutoStore standard grid bin, 649x449mm footprint"
    dimensions: { width: "0.649m", depth: "0.449m", height: "0.31m" }
    max_weight: "30kg"
    stackable: true
    volume: "0.09m3"

  - id: "order_tote"
    description: "Order container that picked goods are placed into at a goods-to-person port (holds WIP for one or more orders)"
    dimensions: { width: "0.6m", depth: "0.4m", height: "0.32m" }
    max_weight: "25kg"
    stackable: true
    volume: "0.077m3"
