# Reusable catalog of warehouse process types (goods receipt, goods issue, internal movement).
# Referenced by movement_rule.trigger.

process_types:
  - id: "putaway_task"
    category: "inbound"
    description: "Move goods from goods receipt into storage"

  - id: "pick_task"
    category: "outbound"
    description: "Retrieve goods from storage for goods issue"

  - id: "replenishment_task"
    category: "internal_movement"
    description: "Move goods from bulk storage to a pick face"

  - id: "bin_return"
    category: "internal_movement"
    description: "Return a bin/container to storage after a goods-to-person pick (e.g. an AutoStore bin re-stowed into the grid with its remaining stock)"

  - id: "bin_provision"
    category: "internal_movement"
    description: "Provide an empty bin/container at a port for induction/decanting (e.g. an empty AutoStore bin retrieved from the grid so goods can be packed into it)"

  - id: "clarification"
    category: "internal_movement"
    description: "Manual clarification of an identification error at a reporting point"

  - id: "cross_dock_task"
    category: "cross_dock"
    description: "Move goods directly from inbound staging to outbound staging, bypassing storage"
